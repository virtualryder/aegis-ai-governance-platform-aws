# Aegis agent manifest — generated by tools/add_agent.py
# Conforms to governance/onboarding/agent-manifest.schema.json and clears the
# 9-point minimum bar (governance/onboarding/MINIMUM-BAR.md).

apiVersion: aegis/v1
kind: Agent

metadata:
  id: billing-inquiry
  name: Billing Inquiry
  description: >-
    Decision-support agent scaffolded for the enterprise pack. Reads and
    summarizes; all consequential actions are withheld and human-gated.
  owner: dept-finance
  team: default
  packs:
    - enterprise
  classification:
    - public
    - pii
  blast_radius: low

grants:
  tools:
    - id: kb.search_policy
      scope: read
      data_classes: [public, pii]
    - id: record.read
      scope: read
      data_classes: [public, pii]
    - id: record.draft_note
      scope: write
      data_classes: [public, pii]
  consequential:
    # Withheld from the agent; reachable only via the human gate.
    - record.issue_decision

grounding:
  knowledge_base: kb-enterprise-default
  grounding_threshold: 0.8
  relevance_threshold: 0.75

budget:
  monthly_token_cap: 50000000
  inference_profile: aip-enterprise-default
  cap_behavior: hard
  alert_thresholds: [0.6, 0.85, 1.0]

evals:
  suite: evals/billing-inquiry/
  min_pass_rate: 0.95
  categories:
    - accuracy
    - refusal
    - fairness
    - prompt_injection
    - accessibility
    - grounding

human_gate:
  mode: step_functions_wait_for_task_token
  separation_of_duties: true
  approval_ttl_seconds: 3600
  esignature_grade: false

signing:
  publisher: platform-team
  signature: "cosign:GENERATED-PLACEHOLDER-SIGN-BEFORE-DEPLOY"
  algorithm: cosign
