clean_account_deploy:
  status: platform-controls-validated
  detail: "10 live AWS runs of the governance core -> MCP endpoint (deployed, exercised with real
           requests, torn down). Live external SaaS connectors, monitoring, DR, and production
           certification remain OUTSIDE the repo (engagement/customer-owned)."
  evidence: evidence/CLEAN-ACCOUNT-ACCEPTANCE.md
  # HONESTY / scope of 'deploy-validated' below (updated 2026-07-12, B3): the inline governance SUBSET
  # has been REMOVED from mcp-gateway.yaml. The authorizer Lambda now imports the REVIEWED platform_core
  # engine from a Lambda layer — its authorization DECISION comes from platform_core.policy_engine (the
  # full 9-clause ALLOW-iff predicate) and its boundary masking from platform_core.masker (fail-closed),
  # both staged from the single source of truth ../platform_core by prepare_layer.sh (so the deployed
  # engine cannot drift from the offline-tested one). The template is cfn-lint-clean and the handler's
  # ALLOW/DENY/APPROVAL_REQUIRED decisions + masking are verified locally against the staged layer.
  # DONE (2026-07-12): the layer-backed authorizer was live-redeployed on a clean account
  # (864217980669, us-east-1, stack aegis-mcp-gateway-b3) and torn down with zero residual. Over HTTPS
  # with a Cognito ID token the REVIEWED engine returned ALLOW (kb.search_policy), ALLOW+masked
  # (ticket.create_draft — reviewed masker redacted SSN/email in the response AND the append-only audit
  # row), DENY (db.drop — deny-by-default), and APPROVAL_REQUIRED (ticket.submit — human gate). The
  # deny/gate strings are platform_core.policy_engine's verbatim messages, proving deployed == reviewed
  # engine. Evidence: infra/golden-pilot/B3-LIVE-DEPLOY-EVIDENCE.md.
  deployed_authorizer: mcp-gateway-platform_core-layer   # reviewed engine via layer; live-redeployed + torn down 2026-07-12

