AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Aegis Run 10 - a real MCP-protocol gateway (portable pattern).
  API Gateway HTTP API with a Cognito JWT authorizer in front of a Lambda that
  speaks MCP JSON-RPC 2.0 (initialize, tools/list, tools/call). The authorizer
  now runs the REVIEWED platform_core engine, shipped as a Lambda layer: the
  deny-by-default authorization DECISION comes from platform_core.policy_engine
  (the full 9-clause ALLOW-iff predicate) and boundary masking from
  platform_core.masker (fail-closed). The DynamoDB append-only audit sink (IAM
  explicitly denies UpdateItem/DeleteItem) and the DynamoDB reviewer-ledger
  single-use approval consume are the AWS-native I/O around that engine. The
  previous inline governance SUBSET (a hand-rolled allow-list dict + a one-line
  regex) has been deleted, so the deployed artifact IS the reviewed engine.
  AgentCore Gateway remains the managed-service path (docs/07); this template
  proves the same controls on the portable API Gateway pattern in any region.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, test]
  LedgerTableName:
    Type: String
    Default: ""
    Description: >-
      Name of the reviewer-service approval ledger DynamoDB table (from reviewer-api.yaml,
      e.g. aegis-api-ledger-dev). When set, consequential tool calls are validated against
      this ledger with an atomic single-use consume bound to the calling identity. When empty,
      the gateway DENIES all consequential tools (fail-closed) rather than trusting the caller.

Conditions:
  HasLedger: !Not [!Equals [!Ref LedgerTableName, ""]]

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub aegis-mcp-${Environment}
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 16
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub aegis-mcp-client-${Environment}
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours

  AuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub aegis-mcp-audit-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

  McpFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub aegis-mcp-fn-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: audit-append-only
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowAppend
                Effect: Allow
                Action: dynamodb:PutItem
                Resource: !GetAtt AuditTable.Arn
              - Sid: DenyMutation
                Effect: Deny
                Action:
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt AuditTable.Arn
              - !If
                - HasLedger
                - Sid: ConsumeApproval
                  Effect: Allow
                  Action: dynamodb:UpdateItem
                  Resource: !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${LedgerTableName}
                - !Ref AWS::NoValue

  # The REVIEWED engine, shipped as a layer. layer/python/platform_core is
  # pre-staged from the single source of truth (../../platform_core) by
  # prepare_layer.sh, so the deployed engine cannot drift from the offline-tested
  # one. Run `./prepare_layer.sh` before `sam build`.
  PlatformCoreLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub aegis-platform-core-${Environment}
      Description: Reviewed Aegis platform_core governance engine (policy_engine, masker, ...).
      ContentUri: layer/
      CompatibleRuntimes: [python3.12]
      RetentionPolicy: Delete

  McpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub aegis-mcp-gateway-${Environment}
      Runtime: python3.12
      Handler: handler.handler
      CodeUri: gateway-src/
      Timeout: 15
      MemorySize: 256
      Role: !GetAtt McpFunctionRole.Arn
      Layers:
        - !Ref PlatformCoreLayer
      Environment:
        Variables:
          TABLE: !Ref AuditTable
          LEDGER: !If [HasLedger, !Ref LedgerTableName, ""]

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub aegis-mcp-gateway-${Environment}
      ProtocolType: HTTP

  JwtAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      Name: cognito-jwt
      ApiId: !Ref HttpApi
      AuthorizerType: JWT
      IdentitySource:
        - $request.header.Authorization
      JwtConfiguration:
        Issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
        Audience:
          - !Ref UserPoolClient

  Integration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt McpFunction.Arn
      PayloadFormatVersion: "2.0"

  McpRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /mcp
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub integrations/${Integration}

  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  InvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref McpFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/mcp

Outputs:
  McpEndpoint:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/mcp
  UserPoolId:
    Value: !Ref UserPool
  ClientId:
    Value: !Ref UserPoolClient
  AuditTableName:
    Value: !Ref AuditTable
